<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">{{ 'common.cancel' | translate }}</ion-button>
    </ion-buttons>
    <ion-title>{{ 'sendText.title' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="pasteFromClipboard()">
        <ion-icon name="clipboard-outline" size="large"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="send-text-content">
  <ion-textarea
    [(ngModel)]="text"
    [placeholder]="'sendText.placeholder' | translate"
    [autofocus]="true"
    [style.height]="textareaHeight"
    class="send-text-area">
  </ion-textarea>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="send-buttons">
      <ion-button expand="block" (click)="sendKeyboard()">
        <ion-icon slot="start" name="keypad-outline"></ion-icon>
        {{ 'sendText.sendKeyboard' | translate }}
      </ion-button>
      <ion-button expand="block" color="secondary" (click)="sendClipboard()">
        <ion-icon slot="start" name="paper-plane-outline"></ion-icon>
        {{ 'sendText.sendClipboard' | translate }}
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
